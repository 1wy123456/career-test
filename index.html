<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>你该打工还是创业？</title>
<style>
:root {
  --bg: #f7f8fc;
  --card: #ffffff;
  --text: #1a1a2e;
  --sub: #8e8ea0;
  --accent: #e74c3c;
  --accent-light: #fde8e8;
  --border: #e8e8f0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --radius: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}

.grid-bg {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(100,120,180,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,120,180,0.04) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none;
  z-index: -1;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  padding: 16px 20px 12px;
  border-bottom: 1px solid transparent;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.header-counter {
  font-size: 13px;
  color: var(--sub);
  font-weight: 500;
}

.header-title {
  font-size: 12px;
  color: var(--sub);
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.main {
  position: relative;
  z-index: 1;
  padding: 0 20px 100px;
}

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px 20px;
  box-shadow: var(--shadow);
  margin-top: 16px;
  animation: fadeInUp 0.35s ease;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.question-number {
  font-size: 72px;
  font-weight: 800;
  color: rgba(26,26,46,0.04);
  line-height: 1;
  margin-bottom: -20px;
  position: relative;
  z-index: 0;
}

.question-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.6;
  color: var(--text);
  position: relative;
  z-index: 1;
  margin-bottom: 24px;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #fafafc;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.option:active { transform: scale(0.98); }

.option.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}

.option.selected .option-letter {
  background: var(--accent);
  color: white;
}

.option-letter {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #eef0f8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--sub);
  flex-shrink: 0;
  transition: all 0.2s ease;
}

.option-text {
  font-size: 15px;
  color: var(--text);
  line-height: 1.4;
  font-weight: 500;
}

.bottom-hint {
  text-align: center;
  padding: 20px;
  font-size: 12px;
  color: var(--sub);
}

.start-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  padding: 40px 20px;
  text-align: center;
}

.start-icon {
  font-size: 64px;
  margin-bottom: 24px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.start-title {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.3;
}

.start-title .red { color: var(--accent); }

.start-sub {
  font-size: 14px;
  color: var(--sub);
  margin-bottom: 32px;
  line-height: 1.6;
}

.start-info {
  display: flex;
  gap: 24px;
  margin-bottom: 40px;
}

.start-info-item { text-align: center; }

.start-info-num {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
}

.start-info-label {
  font-size: 11px;
  color: var(--sub);
  margin-top: 2px;
}

.btn-start {
  width: 100%;
  max-width: 280px;
  padding: 16px 32px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.btn-start:active { transform: scale(0.96); opacity: 0.9; }

.expired-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
  padding: 40px 20px;
  text-align: center;
}

.expired-icon { font-size: 64px; margin-bottom: 24px; }

.expired-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 12px;
}

.expired-sub {
  font-size: 14px;
  color: var(--sub);
  line-height: 1.6;
}

.result-screen {
  padding: 20px;
  animation: fadeInUp 0.5s ease;
}

.result-header {
  text-align: center;
  margin-bottom: 24px;
}

.result-emoji { font-size: 72px; margin-bottom: 12px; }

.result-type {
  display: inline-block;
  padding: 6px 16px;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
}

.result-title {
  font-size: 24px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 4px;
}

.result-subtitle { font-size: 14px; color: var(--sub); }

.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

.result-card h3 {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.result-card p {
  font-size: 14px;
  color: #555;
  line-height: 1.7;
}

.score-bar-wrap { margin: 12px 0; }

.score-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--sub);
  margin-bottom: 4px;
}

.score-bar {
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.score-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #3498db, var(--accent));
  border-radius: 4px;
  transition: width 0.8s ease;
}

.stars { font-size: 20px; letter-spacing: 2px; }

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 8px;
}

.tag {
  padding: 4px 12px;
  background: #f0f2f8;
  border-radius: 12px;
  font-size: 12px;
  color: var(--sub);
}

.btn-share {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}

.btn-share:active { opacity: 0.9; }

.lock-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.03);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lock-overlay.hidden { display: none; }

.lock-card {
  background: white;
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  max-width: 320px;
  width: 90%;
}

.lock-icon { font-size: 56px; margin-bottom: 16px; }

.lock-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.lock-sub {
  font-size: 13px;
  color: var(--sub);
  line-height: 1.6;
}
</style>
</head>

        ? new Date(data.completedAt).toLocaleString('zh-CN')
        : '';
      lockPage('链接已失效', '此测试链接为一次性使用，已于 ' + timeStr + ' 完成。如需重新测试请联系管理员获取新链接。', '\uD83D\uDD12');
      showExpired('链接已失效', '此测试链接为一次性使用，已完成测试。');
      return false;
    }

    return true;
  }

  // ===== RENDER =====
  function showExpired(title, sub, icon) {
    var main = document.getElementById('main');
    document.getElementById('header').style.display = 'none';
    main.innerHTML = '<div class="expired-screen">' +
      '<div class="expired-icon">' + (icon || '\uD83D\uDD12') + '</div>' +
      '<div class="expired-title">' + title + '</div>' +
      '<div class="expired-sub">' + sub + '</div>' +
    '</div>';
  }

  function lockPage(title, sub, icon) {
    var overlay = document.getElementById('lockOverlay');
    document.getElementById('lockIcon').textContent = icon || '\uD83D\uDD12';
    document.getElementById('lockTitle').textContent = title;
    document.getElementById('lockSub').textContent = sub;
    overlay.classList.remove('hidden');
  }

  function renderStart() {
    var main = document.getElementById('main');
    var header = document.getElementById('header');
    header.style.display = 'none';
    main.innerHTML = '<div class="start-screen">' +
      '<div class="start-icon">\uD83E\uDD14</div>' +
      '<div class="start-title">你该<span class="red">打工</span><br>还是<span class="red">创业</span>？</div>' +
      '<div class="start-sub">20道深度人格分析题<br>精准定位你的职业基因</div>' +
      '<div class="start-info">' +
        '<div class="start-info-item"><div class="start-info-num">20</div><div class="start-info-label">道题目</div></div>' +
        '<div class="start-info-item"><div class="start-info-num">5</div><div class="start-info-label">种结果</div></div>' +
        '<div class="start-info-item"><div class="start-info-num">~3min</div><div class="start-info-label">预计用时</div></div>' +
      '</div>' +
      '<div class="start-sub" style="font-size:11px;color:#c0c0c0;margin-top:-20px;margin-bottom:20px;">\u26A0\uFE0F 此链接仅可使用一次，完成后自动失效</div>' +
      '<button class="btn-start" id="btnStart">开始测试</button>' +
    '</div>';

    document.getElementById('btnStart').addEventListener('click', function() {
      testStarted = true;
      startTest();
    });
  }

  function renderQuestion(idx) {
    var q = questions[idx];
    var main = document.getElementById('main');
    var header = document.getElementById('header');
    header.style.display = 'block';
    document.getElementById('counter').textContent = String(idx+1).padStart(2,'0') + ' / 20';
    document.getElementById('progress').style.width = ((idx)/20*100) + '%';

    var html = '<div class="question-card">' +
      '<div class="question-number">' + String(idx+1).padStart(2,'0') + '</div>' +
      '<div class="question-text">' + q.q + '</div>' +
      '<div class="options">';

    for (var i = 0; i < q.opts.length; i++) {
      html += '<div class="option" data-idx="' + i + '">' +
        '<div class="option-letter">' + letters[i] + '</div>' +
        '<div class="option-text">' + q.opts[i] + '</div>' +
      '</div>';
    }
    html += '</div></div><div class="bottom-hint">选择后自动进入下一题</div>';

    main.innerHTML = html;

    var opts = main.querySelectorAll('.option');
    for (var j = 0; j < opts.length; j++) {
      (function(optEl, qIdx) {
        optEl.addEventListener('click', function() {
          if (this.classList.contains('selected')) return;
          var allOpts = this.parentElement.querySelectorAll('.option');
          for (var k = 0; k < allOpts.length; k++) {
            allOpts[k].classList.remove('selected');
          }
          this.classList.add('selected');
          var optIdx = parseInt(this.getAttribute('data-idx'));
          answers[qIdx] = optIdx;
          totalScore += scores[optIdx];

          setTimeout(function() {
            if (qIdx < questions.length - 1) {
              currentQuestion = qIdx + 1;
              renderQuestion(currentQuestion);
            } else {
              completeTest();
            }
          }, 350);
        });
      })(opts[j], idx);
    }
  }

  function completeTest() {
    testCompleted = true;
    document.getElementById('progress').style.width = '100%';
    document.getElementById('counter').textContent = '20 / 20';

    var result = null;
    for (var i = 0; i < results.length; i++) {
      if (totalScore >= results[i].range[0] && totalScore <= results[i].range[1]) {
        result = results[i];
        break;
      }
    }

    // Mark token as used in localStorage
    markTokenUsed(TOKEN, {
      type: result.type,
      title: result.title,
      score: totalScore
    });

    showResult(result);
  }

  function showResult(result) {
    var main = document.getElementById('main');
    var header = document.getElementById('header');
    header.style.display = 'none';

    var starStr = '';
    for (var s = 0; s < result.stars; s++) starStr += '\u2B50';
    for (var s2 = result.stars; s2 < 5; s2++) starStr += '\u2606';

    var tagsHtml = '';
    for (var t = 0; t < result.tags.length; t++) {
      tagsHtml += '<span class="tag">' + result.tags[t] + '</span>';
    }

    var scorePercent = ((totalScore - 20) / 40 * 100);

    main.innerHTML = '<div class="result-screen">' +
      '<div class="result-header">' +
        '<div class="result-emoji">' + result.emoji + '</div>' +
        '<div class="result-type">' + result.type + '</div>' +
        '<div class="result-title">' + result.title + '</div>' +
        '<div class="result-subtitle">' + result.subtitle + '</div>' +
      '</div>' +
      '<div class="result-card">' +
        '<h3>\uD83D\uDCCA 创业适配度</h3>' +
        '<div class="stars">' + starStr + '</div>' +
        '<div class="score-bar-wrap">' +
          '<div class="score-bar-label"><span>打工倾向</span><span>创业倾向</span></div>' +
          '<div class="score-bar"><div class="score-bar-fill" style="width:' + scorePercent + '%"></div></div>' +
        '</div>' +
      '</div>' +
      '<div class="result-card">' +
        '<h3>\uD83E\uDDEC 职业基因分析</h3>' +
        '<p>' + result.desc + '</p>' +
      '</div>' +
      '<div class="result-card">' +
        '<h3>\uD83D\uDCA1 行动建议</h3>' +
        '<p>' + result.advice + '</p>' +
      '</div>' +
      '<div class="result-card">' +
        '<h3>\uD83C\uDFF7\uFE0F 你的优势标签</h3>' +
        '<div class="tags">' + tagsHtml + '</div>' +
      '</div>' +
      '<button class="btn-share" id="btnShare">\uD83D\uDCE4 分享结果</button>' +
    '</div>';

    document.getElementById('btnShare').addEventListener('click', shareResult);
  }

  function startTest() {
    currentQuestion = 0;
    answers = [];
    totalScore = 0;
    renderQuestion(0);
  }

  function shareResult() {
    var result = null;
    for (var i = 0; i < results.length; i++) {
      if (totalScore >= results[i].range[0] && totalScore <= results[i].range[1]) {
        result = results[i];
        break;
      }
    }
    var starEmoji = '';
    for (var s = 0; s < result.stars; s++) starEmoji += '\u2B50';
    var text = '\uD83D\uDD0D 我测了"你该打工还是创业"，结果是：' + result.emoji + ' ' + result.type + '——' + result.title + '\n创业适配度：' + starEmoji;
    if (navigator.share) {
      navigator.share({ title: '你该打工还是创业？', text: text });
    } else {
      navigator.clipboard.writeText(text).then(function() {
        alert('结果已复制到剪贴板！');
      });
    }
  }

  // ===== INIT =====
  if (checkToken()) {
    renderStart();
  }

  window.addEventListener('beforeunload', function(e) {
    if (testStarted && !testCompleted) {
      e.preventDefault();
      e.returnValue = '测试进行中，离开将丢失进度。';
      return e.returnValue;
    }
  });
})();
</script>

</body>
</html>
